<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
</head>
<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

    function run() {

    const anos = [
        "2015", "2016", "2017", "2018",
        "2019", "2020", "2021", "2022",
        "2023", "2024", "2025"
    ];

    const totalChuva = [
        386.7, 295, 211.5, 764.8,
        497.9, 591.3, 388.5, 938.6,
        465.6, 378.2, 528.5
    ];

    const todas = [
        ["Ano", "Variação (mm)"]
    ];

    const positivas = [
        ["Ano", "Variação (mm)"]
    ];

    const negativas = [
        ["Ano", "Variação (mm)"]
    ];

    for (let i = 1; i < totalChuva.length; i++) {

        const variacao = +(totalChuva[i] - totalChuva[i - 1]).toFixed(1);

        const linha = [
            anos[i],
            variacao
        ];

        todas.push(linha);

        if (variacao >= 0) {
            positivas.push(linha);
        } else {
            negativas.push(linha);
        }
    }

    const option = {

        title: {
            text: 'Variação da chuva acumulada por ano (2016–2025)\nFazenda Carnaúba – Taperoá – PB',
            left: 'center'
        },

        legend: {
            top: 60,
            selected: {
                "Todas": true,
                "Positivas": false,
                "Negativas": false
            }
        },

        tooltip: {
            trigger: 'axis',
            axisPointer: {
                type: 'shadow'
            },
            formatter(params) {

                const p = params[0];

                return `
                    <b>${p.value[0]}</b><br/>
                    Variação: <b>${p.value[1]} mm</b>
                `;
            }
        },

        toolbox: {
            feature: {
                dataZoom: {
                    yAxisIndex: 'none'
                },
                restore: {},
                saveAsImage: {}
            }
        },

        visualMap: {
            show: false,
            min: -500,
            max: 600,
            dimension: 1,
            inRange: {
                color: [
                    '#B71C1C',
                    '#EF5350',
                    '#FFCDD2',
                    '#F5F5F5',
                    '#BBDEFB',
                    '#64B5F6',
                    '#0D47A1'
                ]
            }
        },

        grid: {
            left: '10%',
            right: '8%',
            top: '22%',
            bottom: '18%'
        },

        xAxis: {
            type: 'category',
            name: 'Ano'
        },

        yAxis: {
            type: 'value',
            name: 'Variação (mm)'
        },

        dataZoom: [
            {
                type: 'slider'
            },
            {
                type: 'inside'
            }
        ],

        dataset: [
            {
                id: 'todas',
                source: todas
            },
            {
                id: 'positivas',
                source: positivas
            },
            {
                id: 'negativas',
                source: negativas
            }
        ],

        series: [

            {
                name: 'Todas',
                type: 'bar',
                datasetId: 'todas',
                encode: {
                    x: 'Ano',
                    y: 'Variação (mm)'
                },

                markLine: {
                    silent: true,
                    symbol: 'none',
                    data: [
                        { yAxis: 0 }
                    ]
                }
            },

            {
                name: 'Positivas',
                type: 'bar',
                datasetId: 'positivas',
                encode: {
                    x: 'Ano',
                    y: 'Variação (mm)'
                },

                itemStyle: {
                    color: '#1565C0'
                }
            },

            {
                name: 'Negativas',
                type: 'bar',
                datasetId: 'negativas',
                encode: {
                    x: 'Ano',
                    y: 'Variação (mm)'
                },

                itemStyle: {
                    color: '#C62828'
                }
            }

        ]
    };
    
    // Desenha o gráfico
    myChart.setOption(option);

    // Remove eventos antigos (caso run() seja chamado novamente)
    myChart.off('legendselectchanged');

    // Faz a legenda funcionar como filtro exclusivo
    myChart.on('legendselectchanged', function (params) {

        const selecionada = params.name;

        // Impede que todas as opções sejam desmarcadas
        if (!params.selected[selecionada]) {

            myChart.setOption({
                legend: {
                    selected: {
                        "Todas": true,
                        "Positivas": false,
                        "Negativas": false
                    }
                }
            });

            return;
        }

        const selected = {
            "Todas": false,
            "Positivas": false,
            "Negativas": false
        };

        selected[selecionada] = true;

        myChart.setOption({
            legend: {
                selected: selected
            }
        });

    });

}

run();

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
